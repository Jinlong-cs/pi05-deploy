name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  package-and-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip build

      - name: Verify syntax
        run: python -m compileall -q src scripts

      - name: Install package without runtime deps
        run: python -m pip install -e . --no-deps

      - name: Import package
        run: python -c "import pi05_orin; print(pi05_orin.__all__)"

      - name: Validate helper script entrypoint
        run: python scripts/setup_pi05_stack.py --validate >/dev/null
